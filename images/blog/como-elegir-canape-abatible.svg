<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Cómo elegir un canapé abatible">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17284f"/><stop offset="1" stop-color="#0c1730"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="540" ry="310" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>

  <!-- Base del canapé -->
  <g fill="none" stroke="#E9C766" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M330 480 h540 v-96 h-540 z" stroke-opacity="0.9"/>
    <path d="M352 480 v42 M848 480 v42" stroke-opacity="0.7"/>
  </g>
  <!-- Interior: almacenaje -->
  <g fill="none" stroke="#F2E7CE" stroke-opacity="0.34" stroke-width="2">
    <rect x="372" y="404" width="120" height="60" rx="5"/>
    <rect x="512" y="416" width="150" height="48" rx="5"/>
    <rect x="682" y="398" width="110" height="66" rx="5"/>
    <path d="M432 404 v60 M587 416 v48"/>
  </g>

  <!-- Tapa abatida con pistón -->
  <g transform="rotate(-26 330 384)">
    <rect x="330" y="330" width="540" height="52" rx="8" fill="none" stroke="#E9C766" stroke-width="2.8" stroke-opacity="0.95"/>
    <g stroke="#D4AF37" stroke-opacity="0.55" stroke-width="1.6">
      <path d="M370 356 h460"/>
    </g>
  </g>
  <!-- Pistón de gas -->
  <g stroke="#D4AF37" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.9">
    <path d="M420 470 L 545 372"/>
    <circle cx="420" cy="470" r="5" fill="#D4AF37"/>
    <circle cx="545" cy="372" r="5" fill="#D4AF37"/>
  </g>
  <!-- Arco de apertura -->
  <path d="M370 356 A 250 250 0 0 1 640 196" fill="none" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.8" stroke-dasharray="6 10"/>
  <path d="M628 190 l16 8 l-14 12 z" fill="#D4AF37" fill-opacity="0.7"/>

  <g transform="translate(1010 528) scale(0.13)" fill="#D4AF37" fill-opacity="0.5">
    <path d="M 120,118 C 260,40 420,40 560,92 C 680,135 800,130 915,82 C 800,158 668,163 552,118 C 420,68 268,68 120,118 Z"/>
    <path d="M 60,175 C 200,208 340,205 480,150 C 620,100 780,104 945,152 C 785,118 635,130 490,180 C 350,228 200,228 60,175 Z"/>
  </g>
</svg>
