<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Viscoelástica frente a muelles ensacados">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17284f"/><stop offset="1" stop-color="#0c1730"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="540" ry="310" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>

  <!-- Divisoria central -->
  <line x1="600" y1="110" x2="600" y2="520" stroke="#D4AF37" stroke-opacity="0.32" stroke-width="1.5" stroke-dasharray="7 11"/>

  <!-- Izquierda: viscoelástica que se amolda al cuerpo -->
  <g stroke="#E9C766" fill="none" stroke-width="2.6" stroke-linecap="round">
    <path d="M170 400 C 250 400, 270 352, 330 352 C 390 352, 400 400, 460 400" stroke-opacity="0.95"/>
    <path d="M170 428 C 250 428, 268 388, 330 388 C 392 388, 400 428, 460 428" stroke-opacity="0.6"/>
    <path d="M170 456 C 250 456, 266 424, 330 424 C 394 424, 400 456, 460 456" stroke-opacity="0.38"/>
    <path d="M170 372 h290" stroke-opacity="0.75"/>
  </g>
  <!-- Peso que se hunde en la espuma -->
  <circle cx="330" cy="318" r="26" fill="#D4AF37" fill-opacity="0.9"/>
  <g stroke="#F2E7CE" stroke-width="2.6" stroke-opacity="0.55" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M330 244 v36"/><path d="M318 268 l12 14 l12 -14"/>
  </g>

  <!-- Derecha: muelles ensacados -->
  <g stroke="#E9C766" fill="none" stroke-width="2.4" stroke-linecap="round">
    <path d="M740 452 h300" stroke-opacity="0.75"/>
    <path d="M740 340 h300" stroke-opacity="0.4"/>
  </g>
  <g fill="none" stroke="#E9C766" stroke-width="2.3" stroke-opacity="0.9">
    <path d="M770 350 q20 12 0 24 q-20 12 0 24 q20 12 0 24 q-20 12 0 24"/>
    <path d="M830 344 q20 12 0 24 q-20 12 0 24 q20 12 0 24 q-20 12 0 24"/>
    <path d="M890 350 q20 12 0 24 q-20 12 0 24 q20 12 0 24 q-20 12 0 24"/>
    <path d="M950 356 q20 12 0 24 q-20 12 0 24 q20 12 0 24 q-20 12 0 24"/>
    <path d="M1010 350 q20 12 0 24 q-20 12 0 24 q20 12 0 24 q-20 12 0 24"/>
  </g>
  <g stroke="#F2E7CE" stroke-opacity="0.28" stroke-width="1.4" fill="none">
    <rect x="756" y="338" width="28" height="120" rx="14"/>
    <rect x="816" y="332" width="28" height="120" rx="14"/>
    <rect x="876" y="338" width="28" height="120" rx="14"/>
    <rect x="936" y="344" width="28" height="120" rx="14"/>
    <rect x="996" y="338" width="28" height="120" rx="14"/>
  </g>

  <!-- Firma de marca -->
  <g transform="translate(1010 528) scale(0.13)" fill="#D4AF37" fill-opacity="0.5">
    <path d="M 120,118 C 260,40 420,40 560,92 C 680,135 800,130 915,82 C 800,158 668,163 552,118 C 420,68 268,68 120,118 Z"/>
    <path d="M 60,175 C 200,208 340,205 480,150 C 620,100 780,104 945,152 C 785,118 635,130 490,180 C 350,228 200,228 60,175 Z"/>
  </g>
</svg>
