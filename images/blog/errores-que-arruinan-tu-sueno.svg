<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Errores que arruinan tu sueño">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17284f"/><stop offset="1" stop-color="#0a1428"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="34%" r="52%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
    <mask id="moon">
      <circle cx="330" cy="232" r="72" fill="#fff"/>
      <circle cx="368" cy="206" r="62" fill="#000"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="360" cy="214" rx="420" ry="300" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>

  <!-- Estrellas -->
  <g fill="#F2E7CE" fill-opacity="0.5">
    <circle cx="880" cy="120" r="2.6"/><circle cx="960" cy="200" r="2"/><circle cx="1060" cy="140" r="2.4"/>
    <circle cx="820" cy="240" r="1.8"/><circle cx="1010" cy="300" r="2.2"/><circle cx="700" cy="150" r="2"/>
    <circle cx="1110" cy="240" r="1.8"/><circle cx="760" cy="330" r="1.6"/>
  </g>

  <!-- Luna creciente -->
  <circle cx="330" cy="232" r="72" fill="#D4AF37" fill-opacity="0.92" mask="url(#moon)"/>

  <!-- Cinco errores tachados -->
  <g stroke="#E9C766" stroke-width="2.6" fill="none" stroke-linecap="round">
    <!-- móvil -->
    <g transform="translate(640 430)">
      <rect x="-18" y="-28" width="36" height="56" rx="6" stroke-opacity="0.8"/>
      <path d="M-8 20 h16" stroke-opacity="0.6"/>
      <path d="M-30 -40 L 30 40" stroke="#D4AF37" stroke-opacity="0.95" stroke-width="3.2"/>
    </g>
    <!-- café -->
    <g transform="translate(760 430)">
      <path d="M-20 -18 h34 v30 a17 17 0 0 1 -34 0 z" stroke-opacity="0.8"/>
      <path d="M14 -10 h10 a10 10 0 0 1 0 20 h-10" stroke-opacity="0.7"/>
      <path d="M-30 -40 L 30 40" stroke="#D4AF37" stroke-opacity="0.95" stroke-width="3.2"/>
    </g>
    <!-- reloj tardío -->
    <g transform="translate(880 430)">
      <circle r="24" stroke-opacity="0.8"/><path d="M0 -13 v14 l10 8" stroke-opacity="0.7"/>
      <path d="M-30 -40 L 30 40" stroke="#D4AF37" stroke-opacity="0.95" stroke-width="3.2"/>
    </g>
    <!-- termómetro / calor -->
    <g transform="translate(1000 430)">
      <path d="M0 -26 v34" stroke-opacity="0.8"/><circle cy="18" r="12" stroke-opacity="0.8"/>
      <path d="M-30 -40 L 30 40" stroke="#D4AF37" stroke-opacity="0.95" stroke-width="3.2"/>
    </g>
  </g>

  <!-- Zzz que no llegan -->
  <g fill="none" stroke="#F2E7CE" stroke-opacity="0.42" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M520 210 h26 l-26 30 h26"/>
    <path d="M574 160 h20 l-20 24 h20"/>
    <path d="M618 122 h15 l-15 18 h15"/>
  </g>

  <g transform="translate(1010 528) scale(0.13)" fill="#D4AF37" fill-opacity="0.5">
    <path d="M 120,118 C 260,40 420,40 560,92 C 680,135 800,130 915,82 C 800,158 668,163 552,118 C 420,68 268,68 120,118 Z"/>
    <path d="M 60,175 C 200,208 340,205 480,150 C 620,100 780,104 945,152 C 785,118 635,130 490,180 C 350,228 200,228 60,175 Z"/>
  </g>
</svg>
