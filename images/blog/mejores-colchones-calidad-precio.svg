<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Mejores colchones calidad-precio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17284f"/><stop offset="1" stop-color="#0c1730"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="540" ry="310" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>

  <!-- Balanza en equilibrio -->
  <g stroke="#E9C766" fill="none" stroke-width="3" stroke-linecap="round">
    <path d="M600 168 v300" stroke-opacity="0.9"/>
    <path d="M500 500 h200" stroke-opacity="0.9"/>
    <path d="M600 468 C 560 468, 540 486, 528 500 M600 468 C 640 468, 660 486, 672 500" stroke-opacity="0.7"/>
    <path d="M340 214 h520" stroke-opacity="0.95"/>
    <circle cx="600" cy="214" r="12" fill="#D4AF37" fill-opacity="0.9" stroke="none"/>
    <path d="M340 214 v42 M860 214 v42" stroke-opacity="0.6"/>
  </g>
  <!-- Platillo izquierdo: precio -->
  <path d="M262 258 h156 l-30 46 h-96 z" fill="none" stroke="#E9C766" stroke-width="2.6" stroke-opacity="0.85"/>
  <g fill="none" stroke="#D4AF37" stroke-width="2.4" stroke-opacity="0.85">
    <circle cx="316" cy="196" r="20"/><circle cx="356" cy="182" r="20"/><circle cx="336" cy="152" r="20"/>
  </g>
  <!-- Platillo derecho: colchón -->
  <path d="M782 258 h156 l-30 46 h-96 z" fill="none" stroke="#E9C766" stroke-width="2.6" stroke-opacity="0.85"/>
  <g fill="none" stroke="#D4AF37" stroke-width="2.6" stroke-opacity="0.9" stroke-linejoin="round">
    <rect x="796" y="160" width="128" height="46" rx="10"/>
    <path d="M810 160 v46 M838 160 v46 M866 160 v46 M894 160 v46"/>
  </g>

  <!-- Marca de equilibrio -->
  <g stroke="#F2E7CE" stroke-opacity="0.3" stroke-width="1.6" fill="none">
    <path d="M540 214 h-40 M660 214 h40"/>
  </g>

  <g transform="translate(1010 528) scale(0.13)" fill="#D4AF37" fill-opacity="0.5">
    <path d="M 120,118 C 260,40 420,40 560,92 C 680,135 800,130 915,82 C 800,158 668,163 552,118 C 420,68 268,68 120,118 Z"/>
    <path d="M 60,175 C 200,208 340,205 480,150 C 620,100 780,104 945,152 C 785,118 635,130 490,180 C 350,228 200,228 60,175 Z"/>
  </g>
</svg>
