<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Elegir colchón sin gastar de más">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17284f"/><stop offset="1" stop-color="#0c1730"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="270" rx="540" ry="310" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.05"/>

  <!-- Etiqueta de precio -->
  <g transform="rotate(-12 500 300)">
    <path d="M330 220 h250 a24 24 0 0 1 17 7 l118 118 a24 24 0 0 1 0 34 l-108 108 a24 24 0 0 1 -34 0 l-118 -118 a24 24 0 0 1 -7 -17 v-108 a24 24 0 0 1 24 -24 z"
          fill="none" stroke="#E9C766" stroke-width="3" stroke-opacity="0.95" stroke-linejoin="round"/>
    <circle cx="392" cy="286" r="20" fill="none" stroke="#E9C766" stroke-width="3" stroke-opacity="0.9"/>
    <g stroke="#D4AF37" stroke-opacity="0.5" stroke-width="2" fill="none">
      <path d="M470 300 h150 M470 340 h110 M470 380 h130"/>
    </g>
  </g>

  <!-- Flecha de ahorro descendente -->
  <g stroke="#D4AF37" fill="none" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M790 250 L 880 340 L 950 270 L 1030 350" stroke-opacity="0.9"/>
    <path d="M1030 350 l2 -46 M1030 350 l-44 4" stroke-opacity="0.9"/>
  </g>
  <g fill="#D4AF37" fill-opacity="0.85">
    <circle cx="790" cy="250" r="6"/><circle cx="880" cy="340" r="6"/><circle cx="950" cy="270" r="6"/>
  </g>

  <!-- Monedas que se quedan en el bolsillo -->
  <g fill="none" stroke="#E9C766" stroke-width="2.4" stroke-opacity="0.75">
    <ellipse cx="850" cy="470" rx="46" ry="15"/>
    <path d="M804 470 v22 a46 15 0 0 0 92 0 v-22"/>
    <ellipse cx="850" cy="440" rx="46" ry="15" stroke-opacity="0.5"/>
  </g>

  <g transform="translate(1010 528) scale(0.13)" fill="#D4AF37" fill-opacity="0.5">
    <path d="M 120,118 C 260,40 420,40 560,92 C 680,135 800,130 915,82 C 800,158 668,163 552,118 C 420,68 268,68 120,118 Z"/>
    <path d="M 60,175 C 200,208 340,205 480,150 C 620,100 780,104 945,152 C 785,118 635,130 490,180 C 350,228 200,228 60,175 Z"/>
  </g>
</svg>
